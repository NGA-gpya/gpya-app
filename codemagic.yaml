workflows:
  ios-workflow:
    name: GPYA iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build IPA
        script: |
          flutter build ipa --release --build-name=1.0.0 --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
